name: Firebase Hosting Production

on:
  push:
    tags:
      - 'firebase-hosting-*'
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy live hosting
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://chunks-offline.web.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript validation
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Deploy Firebase live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHUNKS_OFFLINE }}
          projectId: chunks-offline
          channelId: live
